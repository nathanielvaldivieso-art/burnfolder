<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>burnfolder.com</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <link rel="preconnect" href="https://image.mux.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.mux.com">
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="index-home">
  <header class="site-header">
    <a href="index.html" class="site-brand">burnfolder.com</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="music.html" class="page-nav">music</a>
      <a href="content.html" class="page-nav">video</a>
      <a href="shop.html" class="page-nav">shop</a>
    </nav>
    <a href="cart.html" class="icon-btn site-cart-btn site-cart-btn--hidden" id="cartFloat" title="View cart">cart</a>
  </header>

  <div class="page-wrap">
    <!-- Entries -->
    <ul id="entries"></ul>

    <!-- Newsletter signup -->
    <div class="newsletter-signup newsletter-popup">
      <p>get notified of new entries</p>
      <form id="subscribeForm">
        <input type="email" id="emailInput" name="email" placeholder="your@email.com" required>
        <button type="submit">subscribe</button>
      </form>
      <p id="statusMessage"></p>
    </div>
  </div>

  <!-- Hidden audio list div for playback restoration -->
  <div id="audioList" style="display: none;"></div>
  <div class="page-watermark">burnfolder.com</div>

  <!-- Bottom progress bar -->
  <div class="bottom-progress-bar" id="bottomBar">
    <div class="close-btn" id="closeBtn" aria-label="Close Now Playing">✕</div>
    <div class="bottom-bar-content">
      <mux-player id="activeMuxPlayer" audio playsinline stream-type="on-demand" preload="metadata" style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"></mux-player>
      <span class="song-title" id="songTitle">Track Title</span>
      <div class="bottom-bar-controls">
        <button class="bottom-play-pause-btn" id="bottomPlayPause" aria-label="Play/Pause">▶</button>
        <div class="progress-bar-area" id="progressBarArea">
          <div class="progress" id="progress"></div>
          <div class="progress-playhead" id="progressPlayhead"></div>
        </div>
      </div>
      <div class="loading-spinner" id="loadingSpinner"></div>
    </div>
  </div>

  <script src="entries.js"></script>
<script src="entry-renderer.js"></script>
<script src="songs.js"></script>
  <script src="shared/song-versions.js"></script>
  <script src="stripe-publishable.js"></script>
  <script src="shared/media-session.js?v=20260627h"></script>
  <script src="shared/playback-recall.js?v=20260627h"></script>
  <script src="spa-router.js"></script>
  <script src="shared/playback-prefetch.js?v=20260627h"></script>
  <script src="shared/studio-tap.js?v=20260627h"></script>
  <script src="shared/mux-playback.js?v=20260627h"></script>
  <script src="shared/playback-context.js?v=20260627h"></script>
  <script src="shared/version-picker.js?v=20260627h"></script>
  <script src="shared/now-playing-bar.js?v=20260627h"></script>
  <script src="scripts.js?v=20260627h"></script>
  <script src="shared/site-version.js"></script>
  <script src="shared/register-sw.js"></script>
  <script>
  const entries = window.journalEntries || [];
  const container = document.getElementById("entries");
  entries.forEach(entry => {
    const li = document.createElement("li");
    const link = document.createElement("a");
    link.href = `${entry}.html`;
    link.textContent = entry;
    li.appendChild(link);
    container.appendChild(li);
  });
  </script>
</body>
</html>
