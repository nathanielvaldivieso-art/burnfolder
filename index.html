<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>burnfolder.com</title>
  <!-- Gate only: no Mux CDN. Streaming belongs on audio.html — Mux keeps Safari's
       tab spinner alive forever once a playback-id is restored.
       Prefetch/preconnect only (skins.js) warms audio.html without executing Mux. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.mux.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="prefetch" href="audio.html" as="document">
  <link rel="stylesheet" href="style.css?v=20260720hang2">
  <link rel="stylesheet" href="skins/photonegative.css?v=20260720ac">
  <script>
    // Apply saved skin before paint so the default layout doesn't flash.
    // Also boot the scroll-down gate so we start on the image.
    (function () {
      try {
        var q = new URLSearchParams(location.search);
        var skin = q.has('skin') ? (q.get('skin') || 'default') : (localStorage.getItem('bf-skin') || 'default');
        if (skin && skin !== 'default') document.documentElement.setAttribute('data-skin', skin);
        if (q.get('hitboxes') === '1' || localStorage.getItem('bf-hitboxes') === '1') {
          document.documentElement.setAttribute('data-hitboxes', '1');
        }
        document.documentElement.classList.add('bf-gate-boot');
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      } catch (e) {}
    })();
  </script>
  <script src="shared/site-menu.js?v=20260720w" defer></script>
</head>
<body class="index-home is-home-gate">
  <div id="siteMenu"></div>
  <!-- Landing gate: full-viewport image; scroll down for the music stage -->
  <section class="skin-map skin-map--photonegative" id="skinMapPhotonegative" aria-label="Photonegative">
    <div class="skin-map__stage">
      <div class="skin-map__frame">
        <img
          class="skin-map__img"
          src="IMAGES/TORNADO.jpeg"
          alt="photonegative"
          width="5711"
          height="3213"
          decoding="async"
          fetchpriority="high"
        >
        <!-- Hit masks + traces mounted from skins/hotspots.js (pixel-sampled) -->
        <div class="skin-map__hotspots" id="skinHotspots" aria-label="Site links"></div>
        <a class="skin-map__hint" href="audio.html">scroll down</a>
      </div>
    </div>
  </section>
  <!-- Gives Safari something to scroll so wheel/scroll events fire (overflow:hidden kills them). -->
  <div class="skin-map__scroll-room" aria-hidden="true"></div>

  <a href="cart.html" class="icon-btn site-cart-btn site-cart-btn--hidden" id="cartFloat" title="View cart">cart</a>
  <div id="audioList" style="display: none;"></div>
  <div class="page-watermark" hidden>burnfolder.com</div>

  <!-- No mux-player / bottom bar on the gate — hard-nav to audio.html for playback. -->

  <script src="entries.js"></script>
  <script src="songs.js"></script>
  <script src="spa-router.js?v=20260720play1"></script>
  <script src="skins/hotspots.js"></script>
  <script src="skins/skins.js?v=20260720af"></script>
  <script src="shared/site-version.js"></script>
  <script src="shared/register-sw.js"></script>
</body>
</html>
