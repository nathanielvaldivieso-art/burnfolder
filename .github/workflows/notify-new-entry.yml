name: Notify Subscribers of New Entry

on:
  push:
    branches: [main]
    paths:
      - '[0-9]*.html'
      - 'entries.js'

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for new entries
        id: check
        run: |
          # Notify on newly added dated entry files or newly added entries.js data keys.
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          export BASE_SHA HEAD_SHA

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            NEW_FILES=$(git ls-tree --name-only -r "$HEAD_SHA" | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?\.html$' || true)
          else
            NEW_FILES=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | awk '$1=="A" {print $2}' | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?\.html$' || true)
          fi

          NEW_DATA_ENTRIES=$(node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const { execFileSync } = require('child_process');
          const baseSha = process.env.BASE_SHA;
          const headSha = process.env.HEAD_SHA;

          function loadEntries(source) {
            const ctx = { window: {} };
            vm.createContext(ctx);
            try {
              vm.runInContext(source, ctx);
            } catch (error) {
              return [];
            }
            return Object.keys(ctx.window.entryDataByDate || {});
          }

          function fileAt(ref) {
            try {
              return execFileSync('git', ['show', `${ref}:entries.js`], { encoding: 'utf8', stdio: ['ignore', 'pipe', 'ignore'] });
            } catch (error) {
              return '';
            }
          }

          const headSource = fs.existsSync('entries.js') ? fs.readFileSync('entries.js', 'utf8') : fileAt(headSha);
          const baseSource = baseSha && baseSha !== '0000000000000000000000000000000000000000' ? fileAt(baseSha) : '';
          const before = new Set(loadEntries(baseSource));
          const added = loadEntries(headSource).filter((date) => !before.has(date));
          process.stdout.write(added.join('\n'));
          NODE
          )

          NEW_ENTRIES=$(printf '%s\n%s\n' "$NEW_FILES" "$NEW_DATA_ENTRIES" | sed 's/\.html$//' | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' | sort -u || true)

          if [ -n "$NEW_FILES" ]; then
            :
          fi

          if [ -n "$NEW_ENTRIES" ]; then
            ENTRIES_CSV=$(echo "$NEW_ENTRIES" | paste -sd, -)
            echo "new_entries=$ENTRIES_CSV" >> $GITHUB_OUTPUT
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "Found new entries: $ENTRIES_CSV"
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new entries found"
          fi

      - name: Get subscriber list
        if: steps.check.outputs.has_new == 'true'
        id: subscribers
        env:
          EXPORT_SECRET: ${{ secrets.SUBSCRIBERS_EXPORT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${EXPORT_SECRET:-}" ]; then
            echo "Add GitHub repository secret SUBSCRIBERS_EXPORT_SECRET (same value as Netlify env for export-subscribers)."
            exit 1
          fi
          curl -sS -f -H "Authorization: Bearer ${EXPORT_SECRET}" \
            "https://burnfolder.com/.netlify/functions/export-subscribers" \
            -o subscribers-export.json
          EMAILS=$(jq -r '.subscribers[]?' subscribers-export.json 2>/dev/null | tr '\n' ',' | sed 's/,$//' || true)
          echo "emails=$EMAILS" >> "$GITHUB_OUTPUT"
          echo "Subscribers fetched for notify job."

      - name: Send notification emails
        if: steps.check.outputs.has_new == 'true' && steps.subscribers.outputs.emails != ''
        run: |
          set -euo pipefail
          SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          ENTRIES_CSV="${{ steps.check.outputs.new_entries }}"

          if [ -z "$SENDGRID_API_KEY" ] && [ -z "$RESEND_API_KEY" ]; then
            echo "Missing email provider key. Add RESEND_API_KEY or SENDGRID_API_KEY."
            exit 1
          fi

          IFS=',' read -ra EMAIL_ARRAY <<< "${{ steps.subscribers.outputs.emails }}"
          IFS=',' read -ra ENTRY_ARRAY <<< "$ENTRIES_CSV"
          FAILED_SENDS=0

          for entry in "${ENTRY_ARRAY[@]}"; do
            ENTRY_DATE="$entry"
            ENTRY_URL="https://burnfolder.com/${ENTRY_DATE}.html"
            EMAIL_TEXT=$'new burnfolder entry: '"${ENTRY_DATE}"$'\n\n'"${ENTRY_URL}"
            HTML_CONTENT="<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><style>body{margin:0;padding:0;background:#ffffff;color:#000000;font-family:monospace}table{border-collapse:collapse}.shell{width:100%;padding:32px 16px}.card{max-width:560px;border:1px solid #000000;padding:22px;background:#ffffff}.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.55;margin:0 0 16px 0}.headline{font-size:30px;line-height:1.1;letter-spacing:.02em;margin:0 0 16px 0}.body{font-size:16px;line-height:1.7;opacity:.9;margin:0 0 18px 0}.entry-link{display:inline-block;border:1px solid #000000;padding:10px 14px;text-decoration:none;color:#000000;font-size:14px;letter-spacing:.08em;text-transform:uppercase}.entry-link:hover{background:#000000;color:#ffffff}.footer{margin-top:22px;padding-top:14px;border-top:1px solid #000000;font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.55}@media (max-width:600px){.headline{font-size:24px}}</style></head><body><table role=\"presentation\" width=\"100%\" class=\"shell\"><tr><td align=\"center\"><table role=\"presentation\" width=\"100%\" class=\"card\"><tr><td><p class=\"eyebrow\">burnfolder update</p><h1 class=\"headline\">new entry: ${ENTRY_DATE}</h1><p class=\"body\">a new page is live now.</p><p><a class=\"entry-link\" href=\"${ENTRY_URL}\">open ${ENTRY_DATE}</a></p><p class=\"footer\">burnfolder.com</p></td></tr></table></td></tr></table></body></html>"
          
            for email in "${EMAIL_ARRAY[@]}"; do
              RESPONSE_BODY=$(mktemp)

              if [ -n "$RESEND_API_KEY" ]; then
                PAYLOAD=$(jq -nc \
                  --arg email "$email" \
                  --arg text "$EMAIL_TEXT" \
                  --arg html "$HTML_CONTENT" \
                  --arg subject "new burnfolder entry: ${ENTRY_DATE}" \
                  '{
                    from: "burnfolder <nathaniel@burnfolder.com>",
                    to: [$email],
                    subject: $subject,
                    html: $html,
                    text: $text
                  }')

                HTTP_CODE=$(curl -sS -o "$RESPONSE_BODY" -w "%{http_code}" -X POST https://api.resend.com/emails \
                  -H "Authorization: Bearer $RESEND_API_KEY" \
                  -H "Content-Type: application/json" \
                  --data "$PAYLOAD")
                PROVIDER="Resend"
              else
                PAYLOAD=$(jq -nc \
                  --arg email "$email" \
                  --arg text "$EMAIL_TEXT" \
                  --arg html "$HTML_CONTENT" \
                  --arg subject "new burnfolder entry: ${ENTRY_DATE}" \
                  '{
                    personalizations: [{ to: [{ email: $email }] }],
                    from: { email: "nathaniel@burnfolder.com", name: "burnfolder" },
                    subject: $subject,
                    content: [
                      { type: "text/plain", value: $text },
                      { type: "text/html", value: $html }
                    ]
                  }')

                HTTP_CODE=$(curl -sS -o "$RESPONSE_BODY" -w "%{http_code}" -X POST https://api.sendgrid.com/v3/mail/send \
                  -H "Authorization: Bearer $SENDGRID_API_KEY" \
                  -H "Content-Type: application/json" \
                  --data "$PAYLOAD")
                PROVIDER="SendGrid"
              fi

              echo "${PROVIDER} status for ${email} (${ENTRY_DATE}): ${HTTP_CODE}"
              if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
                echo "${PROVIDER} error for ${email}:"
                cat "$RESPONSE_BODY"
                FAILED_SENDS=$((FAILED_SENDS + 1))
              fi
            done
          done

          if [ "$FAILED_SENDS" -gt 0 ]; then
            echo "$FAILED_SENDS notification send(s) failed."
            exit 1
          fi
