name: Notify Subscribers of New Entry

on:
  push:
    branches: [main]
    paths:
      - '[0-9]*.html'

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for new HTML files
        id: check
        run: |
          # Get list of new dated entry .html files.
          # Supports both M.DD.html and M.DD.YY.html naming.
          NEW_FILES=$(git diff --name-only HEAD^ HEAD | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?\.html$' || true)
          
          if [ -n "$NEW_FILES" ]; then
            # Extract the date from filename (e.g., "10.22" from "10.22.html")
            ENTRY_DATE=$(echo "$NEW_FILES" | head -1 | sed 's/\.html$//')
            echo "new_entry=$ENTRY_DATE" >> $GITHUB_OUTPUT
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "Found new entry: $ENTRY_DATE"
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new entries found"
          fi

      - name: Get subscriber list
        if: steps.check.outputs.has_new == 'true'
        id: subscribers
        run: |
          # Read subscribers from JSON file
          EMAILS=$(cat subscribers.json | jq -r '.subscribers[]' | tr '\n' ',' | sed 's/,$//')
          echo "emails=$EMAILS" >> $GITHUB_OUTPUT
          echo "Subscribers: $EMAILS"

      - name: Send notification emails
        if: steps.check.outputs.has_new == 'true' && steps.subscribers.outputs.emails != ''
        run: |
          set -euo pipefail
          SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          ENTRY_DATE="${{ steps.check.outputs.new_entry }}"
          ENTRY_URL="https://burnfolder.com/${ENTRY_DATE}.html"

          if [ -z "$SENDGRID_API_KEY" ] && [ -z "$RESEND_API_KEY" ]; then
            echo "Missing email provider key. Add RESEND_API_KEY or SENDGRID_API_KEY."
            exit 1
          fi

          IFS=',' read -ra EMAIL_ARRAY <<< "${{ steps.subscribers.outputs.emails }}"
          
          for email in "${EMAIL_ARRAY[@]}"; do
            RESPONSE_BODY=$(mktemp)
            EMAIL_TEXT="new burnfolder entry: ${ENTRY_DATE}\n\n${ENTRY_URL}"

            if [ -n "$RESEND_API_KEY" ]; then
              PAYLOAD=$(jq -nc \
                --arg email "$email" \
                --arg text "$EMAIL_TEXT" \
                --arg subject "new burnfolder entry: ${ENTRY_DATE}" \
                '{
                  from: "burnfolder <onboarding@resend.dev>",
                  to: [$email],
                  subject: $subject,
                  text: $text
                }')

              HTTP_CODE=$(curl -sS -o "$RESPONSE_BODY" -w "%{http_code}" -X POST https://api.resend.com/emails \
                -H "Authorization: Bearer $RESEND_API_KEY" \
                -H "Content-Type: application/json" \
                --data "$PAYLOAD")
              PROVIDER="Resend"
            else
              PAYLOAD=$(jq -nc \
                --arg email "$email" \
                --arg text "$EMAIL_TEXT" \
                --arg subject "new burnfolder entry: ${ENTRY_DATE}" \
                '{
                  personalizations: [{ to: [{ email: $email }] }],
                  from: { email: "nathaniel@burnfolder.com", name: "burnfolder" },
                  subject: $subject,
                  content: [{ type: "text/plain", value: $text }]
                }')

              HTTP_CODE=$(curl -sS -o "$RESPONSE_BODY" -w "%{http_code}" -X POST https://api.sendgrid.com/v3/mail/send \
                -H "Authorization: Bearer $SENDGRID_API_KEY" \
                -H "Content-Type: application/json" \
                --data "$PAYLOAD")
              PROVIDER="SendGrid"
            fi

            echo "${PROVIDER} status for ${email}: ${HTTP_CODE}"
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "${PROVIDER} error for ${email}:"
              cat "$RESPONSE_BODY"
              exit 1
            fi
          done
