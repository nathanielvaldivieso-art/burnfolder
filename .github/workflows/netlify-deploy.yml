name: Trigger Netlify production deploy

# burnfolder.com is served by Netlify (burnfolder.netlify.app).
# GitHub "pages-build-deployment" does NOT update that site — if Netlify's
# GitHub autodeploy is disconnected, pushes go to Pages only and production
# stays stale. This workflow fires a Netlify Build Hook as a backup.
#
# One-time setup:
# 1. Netlify → Site configuration → Build & deploy → Build hooks → Add hook
#    (branch: main). Copy the URL.
# 2. GitHub → Settings → Secrets → Actions → New repository secret
#    Name: NETLIFY_BUILD_HOOK
#    Value: the build hook URL
# 3. Prefer also reconnecting the Netlify site to this GitHub repo so
#    auto-deploys work again without the hook.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Netlify build hook
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${NETLIFY_BUILD_HOOK:-}" ]; then
            echo "::error::Secret NETLIFY_BUILD_HOOK is not set."
            echo "Create a Build Hook in Netlify (Site → Build hooks) for branch main,"
            echo "then add it as a GitHub Actions secret named NETLIFY_BUILD_HOOK."
            echo "Until then, production (burnfolder.com) will not update from pushes."
            exit 1
          fi
          code=$(curl -sS -o /tmp/nf-hook.out -w "%{http_code}" -X POST "$NETLIFY_BUILD_HOOK")
          echo "Build hook HTTP $code"
          cat /tmp/nf-hook.out || true
          echo
          case "$code" in
            200|201|202) echo "Netlify deploy triggered." ;;
            *) echo "::error::Build hook failed with HTTP $code"; exit 1 ;;
          esac
