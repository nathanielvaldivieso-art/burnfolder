<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - burnfolder.com</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://www.mux.com">
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-brand">burnfolder.com</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="music.html" class="page-nav">music</a>
      <a href="content.html" class="page-nav">video</a>
      <a href="shop.html" class="page-nav">shop</a>
    </nav>
    <a href="cart.html" class="icon-btn site-cart-btn site-cart-btn--hidden" id="cartFloat" title="View cart">cart</a>
  </header>

  <div class="page-wrap">
    <p class="page-id">shop</p>
    <div id="shopProductsRoot" class="shop-products" aria-live="polite"></div>
    <div id="audioList" style="display:none"></div>
  </div>
  <div class="page-watermark">shop</div>

  <div class="bottom-progress-bar" id="bottomBar">
    <div class="close-btn" id="closeBtn" aria-label="Close Now Playing">✕</div>
    <div class="bottom-bar-content">
      <mux-player id="activeMuxPlayer" audio playsinline stream-type="on-demand" preload="metadata" style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"></mux-player>
      <span class="song-title" id="songTitle">Track Title</span>
      <div class="bottom-bar-controls">
        <button class="bottom-play-pause-btn" id="bottomPlayPause" aria-label="Play/Pause">▶</button>
      </div>
      <div class="progress-bar-area" id="progressBarArea">
        <div class="progress" id="progress"></div>
        <div class="progress-playhead" id="progressPlayhead"></div>
      </div>
      <div class="loading-spinner" id="loadingSpinner"></div>
    </div>
  </div>

  <script src="entries.js"></script>
  <script src="entry-renderer.js"></script>
  <script src="songs.js"></script>
  <script src="shop-products.js"></script>
  <script src="shared/shop-products-render.js"></script>
  <script src="stripe-publishable.js"></script>
  <script src="spa-router.js"></script>
  <script src="shared/studio-tap.js?v=20260711d"></script>
  <script src="shared/playback-context.js?v=20260711d"></script>
  <script src="shared/version-picker.js?v=20260711d"></script>
  <script src="shared/now-playing-bar.js?v=20260711d"></script>
  <script src="scripts.js?v=20260711d"></script>
  <script src="shared/site-version.js"></script>
  <script src="shared/register-sw.js"></script>
<script src="shared/analytics-config.js"></script>
<script src="shared/analytics-beacon.js"></script>
  <script>
    (function () {
      const root = document.getElementById('shopProductsRoot');
      const api = window.BurnfolderShopProductsRender;
      if (!root || !api) return;

      function promptCustom(product) {
        const bounds = {
          min: Number(product.minAmount) || 1,
          max: Number(product.maxAmount) || 500
        };
        const raw = window.prompt(
          'amount ($' + bounds.min + '–$' + bounds.max + ')',
          String(product.suggestedAmounts && product.suggestedAmounts[0] ? product.suggestedAmounts[0] : bounds.min)
        );
        if (raw == null) return;
        if (typeof window.openDigitalCheckout === 'function') {
          window.openDigitalCheckout(product, raw);
        }
      }

      api.apply(root, {
        onBuy: function (product, amount) {
          if (typeof window.openDigitalCheckout === 'function') {
            window.openDigitalCheckout(product, amount);
          }
        },
        onCustom: promptCustom
      });
    })();
  </script>
</body>
</html>
