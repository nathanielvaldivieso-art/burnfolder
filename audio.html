<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>audio — burnfolder.com</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <link rel="preconnect" href="https://image.mux.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.mux.com">
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="skins/photonegative.css?v=20260720af">
  <script src="shared/site-menu.js?v=20260720w" defer></script>
</head>
<body class="page-audio">
  <div id="siteMenu"></div>
  <a href="cart.html" class="icon-btn site-cart-btn site-cart-btn--hidden" id="cartFloat" title="View cart">cart</a>

  <section class="home-music" id="homeMusic" aria-label="photonegative">
    <div class="home-music__constellation" aria-label="photonegative tracks">
      <button
        type="button"
        class="home-music__song home-music__song--sometimes"
        data-group-key="sometimes"
      >sometimes</button>
      <button
        type="button"
        class="home-music__song home-music__song--fire-escape"
        data-group-key="fire escape"
      >fire escape</button>
      <button
        type="button"
        class="home-music__song home-music__song--photonegative"
        data-group-key="photo negative"
      >photonegative</button>
      <button
        type="button"
        class="home-music__song home-music__song--it-doesnt-matter"
        data-group-key="it doesnt matter"
      >it doesnt matter</button>
    </div>

    <div class="home-music__links" id="homeMusicLinks" aria-label="Listen on">
      <button
        type="button"
        class="home-music__links-toggle"
        id="homeMusicLinksToggle"
        aria-expanded="false"
        aria-controls="homeMusicLinksList"
        hidden
      >links</button>
      <ul class="home-music__links-list" id="homeMusicLinksList" hidden></ul>
    </div>
  </section>

  <div id="audioList" style="display: none;"></div>
  <div class="page-watermark">audio</div>

  <div class="bottom-progress-bar" id="bottomBar">
    <div class="close-btn" id="closeBtn" aria-label="Close Now Playing">✕</div>
    <div class="bottom-bar-content">
      <mux-player id="activeMuxPlayer" audio playsinline stream-type="on-demand" preload="metadata" style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"></mux-player>
      <span class="song-title" id="songTitle">Track Title</span>
      <div class="bottom-bar-controls">
        <button class="bottom-play-pause-btn" id="bottomPlayPause" aria-label="Play/Pause">▶</button>
      </div>
      <div class="progress-bar-area" id="progressBarArea">
        <div class="progress" id="progress"></div>
        <div class="progress-playhead" id="progressPlayhead"></div>
      </div>
      <div class="loading-spinner" id="loadingSpinner"></div>
    </div>
  </div>

  <script src="entries.js"></script>
  <script src="entry-renderer.js"></script>
  <script src="songs.js"></script>
  <script src="shared/song-versions.js"></script>
  <script src="stripe-publishable.js"></script>
  <script src="shared/media-session.js?v=20260709l"></script>
  <script src="shared/playback-recall.js?v=20260709l"></script>
  <script src="spa-router.js?v=20260723play1"></script>
  <script src="album-pages.js?v=20260709l"></script>
  <script src="press-page.js?v=20260709l"></script>
  <script src="shared/playback-prefetch.js?v=20260709l"></script>
  <script src="shared/studio-tap.js?v=20260709l"></script>
  <script src="shared/mux-playback.js?v=20260723lock1"></script>
  <script src="shared/playback-context.js?v=20260709l"></script>
  <script src="shared/version-picker.js?v=20260709l"></script>
  <script src="shared/now-playing-bar.js?v=20260720play1"></script>
  <script src="scripts.js?v=20260720play2"></script>
  <script src="skins/home-music.js?v=20260720s"></script>
  <script src="shared/site-version.js"></script>
  <script src="shared/register-sw.js"></script>
  <script src="shared/analytics-config.js"></script>
  <script src="shared/analytics-beacon.js"></script>
</body>
</html>
