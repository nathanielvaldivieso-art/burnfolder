<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - burnfolder.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-brand">burnfolder.com</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="music.html" class="page-nav">music</a>
      <a href="content.html" class="page-nav">video</a>
      <a href="shop.html" class="page-nav">shop</a>
    </nav>
    <a href="cart.html" class="icon-btn site-cart-btn" id="cartFloat" title="View cart">cart</a>
  </header>

  <div class="page-wrap">
    <p class="page-id">your cart</p>
    <div id="cart-items"></div>
    <div id="cart-total"></div>
    <button id="checkout-btn" class="icon-btn" style="display:none;margin-top:18px;">
      Checkout
    </button>
    <div id="checkout-status" style="margin-top:10px;font-size:0.85em;opacity:0.72;"></div>
    <p id="empty-cart-msg">Your cart is empty.</p>
    <script>
      const stripePublicKey = 'pk_live_51TJGQcBKbG6lpNutrYNDhGV6aFM66hoqLakruHGC4omCXn0Nc9fXAqGzpqRIpq97v6tGP67Vx3vd1vpZbK1YkSks00ZFMq7fjN';
      let stripeClient = null;

      function loadStripe() {
        return new Promise((resolve, reject) => {
          if (window.Stripe) {
            stripeClient = stripeClient || window.Stripe(stripePublicKey);
            resolve();
            return;
          }

          let script = document.querySelector('script[data-stripe-js="true"]');
          if (!script) {
            script = document.createElement('script');
            script.src = 'https://js.stripe.com/v3/';
            script.async = true;
            script.dataset.stripeJs = 'true';
            document.head.appendChild(script);
          }

          script.addEventListener('load', () => {
            stripeClient = window.Stripe(stripePublicKey);
            resolve();
          }, { once: true });

          script.addEventListener('error', () => {
            reject(new Error('Failed to load Stripe.'));
          }, { once: true });
        });
      }

      // Patch cart.js logic for icon Remove and Checkout
      function getCart() {
        return JSON.parse(localStorage.getItem('cart') || '[]');
      }
      function setCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
      }
      function renderCart() {
        const cart = getCart();
        const cartItemsDiv = document.getElementById('cart-items');
        const cartTotalDiv = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkout-btn');
        const emptyMsg = document.getElementById('empty-cart-msg');
        cartItemsDiv.innerHTML = '';
        let total = 0;
        if (cart.length === 0) {
          cartTotalDiv.textContent = '';
          checkoutBtn.style.display = 'none';
          emptyMsg.style.display = 'block';
          return;
        }
        emptyMsg.style.display = 'none';
        checkoutBtn.style.display = 'inline-flex';
        cart.forEach((item, idx) => {
          total += item.price * item.qty;
          const div = document.createElement('div');
          div.className = 'cart-item';
          div.innerHTML = `
            <img src="${item.image}" alt="${item.name}" style="width:60px;vertical-align:middle;"> 
            <span style="margin:0 12px 0 8px;">${item.name} $${item.price} Qty: ${item.qty}</span>
            <button class="icon-btn" title="Remove" onclick="removeFromCart(${idx})">Remove</button>
          `;
          cartItemsDiv.appendChild(div);
        });
        cartTotalDiv.textContent = `Total: $${total}`;
      }
      function removeFromCart(idx) {
        const cart = getCart();
        cart.splice(idx, 1);
        setCart(cart);
        renderCart();
        if (window.updateCartFloat) window.updateCartFloat();
      }

      async function startWalletCheckout() {
        const status = document.getElementById('checkout-status');
        const checkoutBtn = document.getElementById('checkout-btn');
        const cart = getCart();

        if (!cart.length) {
          status.textContent = 'Your cart is empty.';
          return;
        }

        checkoutBtn.disabled = true;
        status.textContent = 'Redirecting to secure checkout...';

        try {
          const res = await fetch('/.netlify/functions/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart })
          });
          const data = await res.json();

          if (!res.ok || (!data.id && !data.url)) {
            throw new Error(data.error || 'Could not create checkout session.');
          }

          if (data.url && /^https:\/\//i.test(data.url)) {
            window.location.href = data.url;
            return;
          }

          await loadStripe();
          if (!stripeClient) throw new Error('Stripe unavailable.');

          const result = await stripeClient.redirectToCheckout({ sessionId: data.id });
          if (result && result.error) {
            throw new Error(result.error.message || 'Could not redirect to checkout.');
          }
        } catch (err) {
          status.textContent = err.message || 'Checkout unavailable.';
          checkoutBtn.disabled = false;
        }
      }

      document.getElementById('checkout-btn').onclick = startWalletCheckout;
      window.addEventListener('DOMContentLoaded', renderCart);
    </script>
  </div>
  <div class="page-watermark">burnfolder.com</div>
</body>
</html>
