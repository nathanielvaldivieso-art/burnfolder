<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - burnfolder.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">
    <a href="music.html" class="page-nav">music</a>
    <a href="content.html" class="page-nav">video</a>
    <a href="shop.html" class="page-nav">shop</a>
      <button class="cart-float icon-btn" id="cartFloat" onclick="window.location.href='cart.html'" title="View cart">
        Cart
      </button>
      <script>
        function updateCartFloat() {
          const cart = JSON.parse(localStorage.getItem('cart') || '[]');
          const float = document.getElementById('cartFloat');
          if (cart.length > 0) {
            float.style.display = 'inline-flex';
          } else {
            float.style.display = 'none';
          }
        }
        updateCartFloat();
        window.addEventListener('storage', updateCartFloat);
        document.addEventListener('DOMContentLoaded', updateCartFloat);
        window.updateCartFloat = updateCartFloat;
      </script>
    <h1>Your Cart</h1>
    <div id="cart-items"></div>
    <div id="cart-total"></div>
    <button id="checkout-btn" class="icon-btn" style="display:none;margin-top:18px;">
      Checkout
    </button>
    <p id="empty-cart-msg">Your cart is empty.</p>
    <script>
      // Patch cart.js logic for icon Remove and Checkout
      function getCart() {
        return JSON.parse(localStorage.getItem('cart') || '[]');
      }
      function setCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
      }
      function renderCart() {
        const cart = getCart();
        const cartItemsDiv = document.getElementById('cart-items');
        const cartTotalDiv = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkout-btn');
        const emptyMsg = document.getElementById('empty-cart-msg');
        cartItemsDiv.innerHTML = '';
        let total = 0;
        if (cart.length === 0) {
          cartTotalDiv.textContent = '';
          checkoutBtn.style.display = 'none';
          emptyMsg.style.display = 'block';
          return;
        }
        emptyMsg.style.display = 'none';
        checkoutBtn.style.display = 'inline-flex';
        cart.forEach((item, idx) => {
          total += item.price * item.qty;
          const div = document.createElement('div');
          div.className = 'cart-item';
          div.innerHTML = `
            <img src="${item.image}" alt="${item.name}" style="width:60px;vertical-align:middle;"> 
            <span style="margin:0 12px 0 8px;">${item.name} $${item.price} Qty: ${item.qty}</span>
            <button class="icon-btn" title="Remove" onclick="removeFromCart(${idx})">Remove</button>
          `;
          cartItemsDiv.appendChild(div);
        });
        cartTotalDiv.textContent = `Total: $${total}`;
      }
      function removeFromCart(idx) {
        const cart = getCart();
        cart.splice(idx, 1);
        setCart(cart);
        renderCart();
        if (window.updateCartFloat) window.updateCartFloat();
      }
      document.getElementById('checkout-btn').onclick = function() {
        window.location.href = 'checkout.html';
      };
      window.addEventListener('DOMContentLoaded', renderCart);
    </script>
  </div>
  <div class="page-watermark">burnfolder.com</div>
</body>
</html>
