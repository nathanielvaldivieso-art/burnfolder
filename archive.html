<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>audio archive — burnfolder.com</title>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>

  <div class="page-wrap">
    <a href="index.html" class="page-nav">home</a>
    <a href="music.html" class="page-nav">music</a>
    <a href="content.html" class="page-nav">content</a>

    <p class="page-id">audio archive</p>

    <p class="page-annotation">unreleased, unmarketed.</p>

    <div class="archive-grid">
      <div class="archive-section" data-section="fight">
        <p class="archive-label">fight</p>
        <div class="archive-track-list"></div>
      </div>

      <div class="archive-section" data-section="kiss">
        <p class="archive-label">kiss</p>
        <div class="archive-track-list"></div>
      </div>

      <div class="archive-section" data-section="dance">
        <p class="archive-label">dance</p>
        <div class="archive-track-list"></div>
      </div>

      <div class="archive-section" data-section="cry">
        <p class="archive-label">cry</p>
        <div class="archive-track-list"></div>
      </div>
    </div>
  </div>

  <div class="page-watermark">audio archive</div>

  <!-- Bottom progress bar -->
  <div class="bottom-progress-bar" id="bottomBar">
    <div class="close-btn" id="closeBtn" aria-label="Close Now Playing">✕</div>
    <div class="bottom-bar-content">
      <mux-player id="activeMuxPlayer" style="width:0;height:0;position:absolute;left:-9999px;"></mux-player>
      <span class="song-title" id="songTitle">Track Title</span>
      <div class="bottom-bar-controls">
        <div class="volume-control" id="volumeControl">
          <div class="speaker-icon" id="speakerIcon">♪</div>
          <div class="volume-fader" id="volumeFader">
            <div class="volume-track">
              <div class="volume-fill" id="volumeFill"></div>
            </div>
          </div>
        </div>
        <button class="bottom-play-pause-btn" id="bottomPlayPause" aria-label="Play/Pause">▶</button>
        <div class="progress-bar-area" id="progressBarArea">
          <div class="progress" id="progress"></div>
          <div class="progress-playhead" id="progressPlayhead"></div>
        </div>
      </div>
      <div class="loading-spinner" id="loadingSpinner"></div>
    </div>
  </div>

  <script src="songs.js"></script>
  <script src="spa-router.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
