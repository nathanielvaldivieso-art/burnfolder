<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="../shared/studio-pwa-viewport.js?v=20260703f"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <title>album — burnfolder studio</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <link rel="preconnect" href="https://image.mux.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="../style.css?v=20260703f">
  <link rel="stylesheet" href="css/studio.css?v=20260703f">
</head>
<body class="studio-page studio-stream-page studio-album-page">
  <header class="site-header studio-header">
    <a href="/studio/index.html" class="site-brand">burnfolder studio</a>
    <nav class="site-nav studio-header-nav studio-main-nav" aria-label="Studio">
      <a href="/studio/index.html" class="studio-main-nav-link" data-nav="entry">entry</a>
      <a href="/studio/stream.html" class="studio-main-nav-link page-nav" data-nav="stream">music</a>
      <a href="/studio/video.html" class="studio-main-nav-link" data-nav="video">video</a>
      <a href="/studio/journal.html" class="studio-main-nav-link" data-nav="journal">journal</a>
    </nav>
  </header>

  <main class="page-wrap studio-album-hub song-hub-page" id="albumMain" hidden>
    <p class="page-id">album hub</p>

    <div class="song-hub-header">
      <div class="song-hub-header-text">
        <h2 class="song-hub-title" data-album-field="title">Album</h2>
        <p class="song-hub-subtitle" data-album-field="subtitle">—</p>
      </div>
    </div>

    <div data-album-panel="cover" class="song-hub-cover-wrap" hidden>
      <img data-album-field="cover" class="song-hub-cover-image" alt="">
    </div>

    <div data-album-panel="video" class="song-hub-panel" hidden>
      <div data-album-field="video-hero" class="studio-song-video-hero"></div>
    </div>

    <div class="song-hub-panel">
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Tracks</p>
      </div>
      <div data-album-field="tracklist"></div>
    </div>

    <div data-album-panel="thoughts" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Thoughts</p>
      </div>
      <div class="song-hub-notes" data-album-field="thoughts"></div>
    </div>

    <div data-album-panel="compiled-lyrics" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Lyrics</p>
        <p class="song-hub-panel-hint">Compiled from each song page</p>
      </div>
      <div data-album-field="compiled-lyrics"></div>
    </div>

    <div data-album-panel="compiled-notes" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Notes</p>
        <p class="song-hub-panel-hint">Album + per-song notes</p>
      </div>
      <div data-album-field="compiled-notes"></div>
    </div>

    <div data-album-panel="visuals" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Visuals</p>
        <p class="song-hub-panel-hint">Album clips + song page media</p>
      </div>
      <div class="song-hub-content-grid" data-album-field="visuals-grid"></div>
    </div>

    <div class="song-hub-panel song-hub-panel--share">
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Share</p>
      </div>
      <div id="albumShareMount"></div>
    </div>

    <div class="song-hub-panel studio-song-actions-panel">
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Tools</p>
      </div>
      <div class="studio-song-actions">
        <a class="icon-btn studio-song-design-btn" id="albumDesignBtn" href="#">design page</a>
        <a class="icon-btn" id="albumMusicBtn" href="/studio/stream.html">music</a>
        <a class="icon-btn" id="albumSiteBtn" href="#" hidden>site</a>
        <button type="button" class="icon-btn" id="albumCopyBtn">copy id</button>
      </div>
    </div>
  </main>

  <p class="studio-stream-status studio-song-status" id="albumStatus" aria-live="polite"></p>

  <script src="js/studio-version.js?v=20260703f"></script>
  <script src="js/studio-status.js?v=20260703f"></script>
  <script src="js/studio-dates.js?v=20260703f"></script>
  <script src="../shared/media-session.js?v=20260703f"></script>
  <script src="../shared/playback-recall.js?v=20260703f"></script>
  <script src="../entries.js?v=20260703f"></script>
  <script src="../songs.js?v=20260703f"></script>
  <script src="../shared/song-versions.js?v=20260703f"></script>
  <script src="js/asset-cloud.js?v=20260703f"></script>
  <script src="../shared/cover-art.js?v=20260703f"></script>
  <script src="../shared/mux-display-name.js?v=20260703f"></script>
  <script src="js/mux-naming.js?v=20260703f"></script>
  <script src="js/studio-auth.js?v=20260703f"></script>
  <script src="js/cloud-state.js?v=20260703f"></script>
  <script src="js/mux-client.js?v=20260703f"></script>
  <script src="js/studio-mux-lib.js?v=20260703f"></script>
  <script src="../shared/playback-prefetch.js?v=20260703f"></script>
  <script src="../shared/studio-tap.js?v=20260703f"></script>
  <script src="../shared/mux-playback.js?v=20260703f"></script>
  <script src="js/studio-playback-shell.js?v=20260703f"></script>
  <script src="../shared/playback-context.js?v=20260703f"></script>
  <script src="../shared/version-picker.js?v=20260703f"></script>
  <script src="../shared/now-playing-bar.js?v=20260703f"></script>
  <script src="../shared/song-page-render.js?v=20260703f"></script>
  <script src="../shared/album-page-render.js?v=20260703f"></script>
  <script src="js/song-page-store.js?v=20260703f"></script>
  <script src="js/album-page-store.js?v=20260703f"></script>
  <script src="js/stream-shared.js?v=20260703f"></script>
  <script src="js/stream-player.js?v=20260703f"></script>
  <script src="js/stream-now-playing.js?v=20260703f"></script>
  <script src="js/share-links.js?v=20260703f"></script>
  <script src="../shared/share-hub-ui.js?v=20260703f"></script>
  <script src="js/stream-album-page.js?v=20260703f"></script>
  <script src="../shared/site-version.js"></script>
  <script src="../shared/register-sw.js"></script>
</body>
</html>
