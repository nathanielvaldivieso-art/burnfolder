<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="../shared/studio-pwa-viewport.js"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="journal">
  <link rel="manifest" href="manifest.webmanifest">
  <title>journal — burnfolder studio</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <link rel="preconnect" href="https://image.mux.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.mux.com">
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="../style.css?v=20260703c">
  <link rel="stylesheet" href="css/studio.css?v=20260703c">
</head>
<body class="studio-page studio-journal-page">
  <header class="site-header studio-header">
    <a href="/studio/index.html" class="site-brand">burnfolder studio</a>
    <nav class="site-nav studio-header-nav studio-main-nav" aria-label="Studio">
      <a href="/studio/index.html" class="studio-main-nav-link page-nav" data-nav="entry">entry</a>
      <a href="/studio/stream.html" class="studio-main-nav-link page-nav" data-nav="stream">music</a>
      <a href="/studio/video.html" class="studio-main-nav-link page-nav" data-nav="video">video</a>
      <a href="/studio/journal.html" class="studio-main-nav-link page-nav" data-nav="journal">journal</a>
    </nav>
  </header>

  <main class="page-wrap studio-journal-layout">
    <p class="page-id">journal</p>

    <details class="studio-help">
      <summary>tips</summary>
      <ul class="studio-help-list">
        <li>journal, plan, and checklist autosave as you type</li>
        <li>use ← → or <strong>today</strong> to jump between days</li>
      </ul>
    </details>

    <div class="studio-journal-date-nav" aria-label="Day">
      <button type="button" class="icon-btn studio-journal-shift" id="journalPrevDay" aria-label="Previous day">←</button>
      <label class="studio-journal-date-field">
        <span class="studio-journal-date-label">day</span>
        <input id="journalDateKey" type="text" inputmode="decimal" spellcheck="false" placeholder="6.4.26">
      </label>
      <button type="button" class="icon-btn studio-journal-shift" id="journalNextDay" aria-label="Next day">→</button>
      <button type="button" class="icon-btn" id="journalTodayBtn">today</button>
    </div>

    <section class="studio-journal-section" aria-labelledby="journalSectionTitle">
      <h2 class="studio-journal-section-title" id="journalSectionTitle">journal</h2>
      <textarea id="journalBody" class="studio-journal-textarea" rows="8" placeholder="write for this day…" spellcheck="true"></textarea>
    </section>

    <section class="studio-journal-section" aria-labelledby="planSectionTitle">
      <h2 class="studio-journal-section-title" id="planSectionTitle">day plan</h2>
      <textarea id="journalPlan" class="studio-journal-textarea studio-journal-textarea--compact" rows="5" placeholder="what matters today…" spellcheck="true"></textarea>
    </section>

    <section class="studio-journal-section" aria-labelledby="checklistSectionTitle">
      <h2 class="studio-journal-section-title" id="checklistSectionTitle">checklist</h2>
      <ul id="journalChecklist" class="studio-journal-checklist" aria-label="Checklist"></ul>
    </section>

    <section class="studio-journal-section studio-journal-recent" aria-labelledby="recentDaysTitle">
      <h2 class="studio-journal-section-title" id="recentDaysTitle">recent days</h2>
      <ul id="journalRecentList" class="studio-journal-recent-list"></ul>
    </section>

    <p class="studio-journal-status" id="journalStatus" aria-live="polite"></p>
  </main>

  <script src="js/studio-version.js?v=20260703c"></script>
  <script src="js/studio-status.js?v=20260703c"></script>
  <script src="js/studio-dates.js?v=20260703c"></script>
  <script src="../shared/media-session.js?v=20260703c"></script>
  <script src="../shared/playback-recall.js?v=20260703c"></script>
  <script src="../shared/playback-prefetch.js?v=20260703c"></script>
  <script src="../shared/studio-tap.js?v=20260703c"></script>
  <script src="../shared/mux-playback.js?v=20260703c"></script>
  <script src="../shared/now-playing-bar.js?v=20260703c"></script>
  <script src="js/studio-playback-shell.js?v=20260703c"></script>
  <script src="js/studio-spa-router.js?v=20260703c"></script>
  <script src="js/studio-auth.js?v=20260703c"></script>
  <script src="js/cloud-state.js?v=20260703c"></script>
  <script src="js/journal-day-store.js?v=20260703c"></script>
  <script src="js/journal-page.js?v=20260703c"></script>
  <script src="../shared/site-version.js"></script>
  <script src="../shared/register-sw.js"></script>
</body>
</html>
