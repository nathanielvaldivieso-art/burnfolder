<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="../shared/studio-pwa-viewport.js?v=20260709e"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="journal">
  <link rel="manifest" href="manifest.webmanifest">
  <title>journal — burnfolder studio</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <link rel="preconnect" href="https://image.mux.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.mux.com">
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="../style.css?v=20260708e">
  <link rel="stylesheet" href="css/studio.css?v=20260708e">
</head>
<body class="studio-page studio-journal-page">
  <header class="site-header studio-header">
    <a href="/studio/index.html" class="site-brand">burnfolder studio</a>
    <nav class="site-nav studio-header-nav studio-main-nav" aria-label="Studio">
      <a href="/studio/dashboard.html" class="studio-main-nav-link page-nav" data-nav="dashboard">dashboard</a>
      <a href="/studio/index.html" class="studio-main-nav-link page-nav" data-nav="entry">entry</a>
      <a href="/studio/stream.html" class="studio-main-nav-link page-nav" data-nav="stream">music</a>
      <a href="/studio/video.html" class="studio-main-nav-link page-nav" data-nav="video">video</a>
      <a href="/studio/journal.html" class="studio-main-nav-link page-nav" data-nav="journal">journal</a>
    </nav>
  </header>

  <main class="page-wrap studio-journal-layout">
    <p class="page-id">journal</p>

    <details class="studio-help">
      <summary>tips</summary>
      <ul class="studio-help-list">
        <li>pick a day on the calendar — journal autosaves as you type</li>
        <li>uploads from music, video, or here land on that day&apos;s library</li>
        <li>filled dots mark days with notes or contributions</li>
      </ul>
    </details>

    <section class="studio-journal-calendar" aria-label="Calendar">
      <div class="studio-journal-calendar-head">
        <button type="button" class="icon-btn studio-journal-shift" id="journalPrevMonth" aria-label="Previous month">←</button>
        <h2 class="studio-journal-calendar-title" id="journalMonthLabel">—</h2>
        <button type="button" class="icon-btn studio-journal-shift" id="journalNextMonth" aria-label="Next month">→</button>
        <button type="button" class="icon-btn" id="journalTodayBtn">today</button>
      </div>
      <div class="studio-journal-calendar-weekdays" aria-hidden="true">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div id="journalCalendarGrid" class="studio-journal-calendar-grid" role="grid" aria-label="Month"></div>
    </section>

    <section class="studio-journal-section" aria-labelledby="journalContributionsTitle">
      <h2 class="studio-journal-section-title" id="journalContributionsTitle">library</h2>
      <details class="studio-stream-upload-details studio-journal-upload-details" id="journalUploadDetails">
        <summary>+ add to this day</summary>
        <div id="journalUpload" class="studio-stream-upload"></div>
        <div id="journalUploadQueue" class="studio-upload-queue-host"></div>
      </details>
      <ul id="journalContributionsList" class="studio-journal-contributions" aria-live="polite"></ul>
    </section>

    <section class="studio-journal-section" aria-labelledby="journalSectionTitle">
      <h2 class="studio-journal-section-title" id="journalSectionTitle"><span id="journalSelectedLabel">—</span></h2>
      <textarea id="journalBody" class="studio-journal-textarea" rows="8" placeholder="write for this day…" spellcheck="false"></textarea>
    </section>

    <p class="studio-journal-status" id="journalStatus" aria-live="polite"></p>
  </main>

  <script src="js/studio-version.js?v=20260709e"></script>
  <script src="js/studio-status.js?v=20260709e"></script>
  <script src="js/studio-dates.js?v=20260709e"></script>
  <script src="../shared/media-session.js?v=20260709e"></script>
  <script src="../shared/playback-recall.js?v=20260709e"></script>
  <script src="../shared/playback-prefetch.js?v=20260709e"></script>
  <script src="../shared/studio-tap.js?v=20260709e"></script>
  <script src="../shared/mux-playback.js?v=20260709e"></script>
  <script src="../shared/playback-context.js?v=20260709e"></script>
  <script src="../shared/version-picker.js?v=20260709e"></script>
  <script src="../shared/now-playing-bar.js?v=20260709e"></script>
  <script src="../shared/studio-playback-stack.js?v=20260709e"></script>
  <script src="js/studio-playback-shell.js?v=20260709e"></script>
  <script src="js/stream-player.js?v=20260709e"></script>
  <script src="js/stream-now-playing.js?v=20260709e"></script>
  <script src="js/studio-spa-router.js?v=20260709e"></script>
  <script src="js/studio-auth.js?v=20260709e"></script>
  <script src="js/cloud-state.js?v=20260709e"></script>
  <script src="js/mux-client.js?v=20260709e"></script>
  <script src="js/asset-cloud.js?v=20260709e"></script>
  <script src="js/upload-queue.js?v=20260709e"></script>
  <script src="js/journal-day-store.js?v=20260709e"></script>
  <script src="js/journal-contributions.js?v=20260709e"></script>
  <script src="js/cloud-ui.js?v=20260709e"></script>
  <script src="js/journal-page.js?v=20260709e"></script>
  <script src="../shared/site-version.js"></script>
  <script src="../shared/register-sw.js"></script>
</body>
</html>
