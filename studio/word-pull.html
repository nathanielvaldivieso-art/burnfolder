<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="../shared/studio-pwa-viewport.js?v=20260717j"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#000000">
  <title>word pull — burnfolder studio</title>
  <link rel="stylesheet" href="../style.css?v=20260721b">
  <link rel="stylesheet" href="css/studio.css?v=20260721b">
</head>
<body class="studio-page studio-word-pull-page">
  <header class="site-header studio-header">
    <a href="/studio/dashboard.html" class="site-brand">burnfolder studio</a>
    <nav class="site-nav studio-header-nav studio-main-nav" aria-label="Studio">
      <a href="/studio/dashboard.html" class="studio-main-nav-link" data-nav="dashboard">dashboard</a>
      <a href="/studio/index.html" class="studio-main-nav-link" data-nav="entry">entry</a>
      <a href="/studio/stream.html" class="studio-main-nav-link" data-nav="stream">music</a>
      <a href="/studio/video.html" class="studio-main-nav-link" data-nav="video">video</a>
      <a href="/studio/journal.html" class="studio-main-nav-link" data-nav="journal">journal</a>
      <a href="/studio/ideas.html" class="studio-main-nav-link" data-nav="ideas">ideas</a>
      <a href="/studio/releases.html" class="studio-main-nav-link" data-nav="releases">releases</a>
    </nav>
  </header>

  <main class="page-wrap studio-word-pull-layout">
    <p class="page-id">word pull</p>
    <div class="studio-word-pull-workspace">
      <div class="studio-word-pull-stage" id="wordPullStage" aria-live="off">
        <div class="studio-word-pull-frame" id="wordPullFrame"></div>
      </div>

      <aside class="studio-word-pull-log" aria-label="Sentence log">
        <h2 class="studio-word-pull-log-title">log</h2>
        <div class="studio-word-pull-compose-row">
          <label class="studio-word-pull-compose">
            <span class="visually-hidden">sentence</span>
            <input
              type="text"
              id="wordPullInput"
              class="studio-word-pull-input"
              autocomplete="off"
              spellcheck="false"
              placeholder="type a sentence from the soup…"
            >
          </label>
          <button type="button" class="icon-btn studio-word-pull-log-btn" id="wordPullLogBtn">log</button>
        </div>
        <p class="studio-word-pull-hint">enter (or tap log) to log</p>
        <div class="studio-word-pull-days" id="wordPullDays"></div>
        <p class="studio-status" id="wordPullLogStatus" aria-live="polite"></p>
      </aside>
    </div>
  </main>

  <script src="js/studio-version.js?v=20260721b"></script>
  <script src="js/studio-auth.js?v=20260717j"></script>
  <script src="js/studio-dates.js?v=20260717j"></script>
  <script src="js/cloud-state.js?v=20260717j"></script>
  <script src="js/word-pull-bank.js?v=20260717j"></script>
  <script src="js/studio-spa-router.js?v=20260717j"></script>
  <script src="js/word-pull-page.js?v=20260721b"></script>
</body>
</html>
