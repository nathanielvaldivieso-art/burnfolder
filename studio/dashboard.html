<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="../shared/studio-pwa-viewport.js?v=20260711c"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#000000">
  <title>dashboard — burnfolder studio</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="../style.css?v=20260710l">
  <link rel="stylesheet" href="css/studio.css?v=20260710t">
</head>
<body class="studio-page studio-dashboard-page">
  <header class="site-header studio-header">
    <a href="/studio/dashboard.html" class="site-brand">burnfolder studio</a>
    <nav class="site-nav studio-header-nav studio-main-nav" aria-label="Studio">
      <a href="/studio/dashboard.html" class="studio-main-nav-link page-nav" data-nav="dashboard">dashboard</a>
      <a href="/studio/index.html" class="studio-main-nav-link" data-nav="entry">entry</a>
      <a href="/studio/stream.html" class="studio-main-nav-link" data-nav="stream">music</a>
      <a href="/studio/video.html" class="studio-main-nav-link" data-nav="video">video</a>
      <a href="/studio/journal.html" class="studio-main-nav-link" data-nav="journal">journal</a>
    </nav>
  </header>

  <div class="studio-analytics-nav" id="dashboardAnalyticsNav" hidden>
    <nav class="studio-analytics-tabs" id="dashboardAnalyticsTabs" role="tablist" aria-label="Analytics">
      <button type="button" class="studio-analytics-tab is-active" data-pane="listen" role="tab" aria-selected="true">listen</button>
      <button type="button" class="studio-analytics-tab" data-pane="traffic" role="tab" aria-selected="false">traffic</button>
      <button type="button" class="studio-analytics-tab" data-pane="money" role="tab" aria-selected="false">money</button>
    </nav>
    <label class="studio-analytics-period-wrap">
      <span class="studio-analytics-period-label">range</span>
      <select id="dashboardAnalyticsPeriod" class="studio-analytics-period-select" aria-label="Time range">
        <option value="hour">hour</option>
        <option value="day">day</option>
        <option value="week" selected>week</option>
        <option value="month">month</option>
        <option value="year">year</option>
        <option value="all">all</option>
      </select>
    </label>
  </div>

  <nav class="studio-analytics-subtabs" id="dashboardListenSubtabs" hidden aria-label="Listen source">
    <button type="button" class="studio-analytics-subtab is-active" data-listen="site">site</button>
    <button type="button" class="studio-analytics-subtab" data-listen="dsp">dsp</button>
  </nav>

  <main class="page-wrap studio-dashboard-layout">
    <section class="studio-dashboard-section" id="dashboardAnalyticsSection">
      <p class="studio-dashboard-empty" id="dashboardAnalyticsEmpty">loading…</p>
      <div id="dashboardAnalyticsFeed" hidden aria-live="polite"></div>
    </section>

    <section class="studio-dashboard-section" id="ownerToolsSection" hidden>
      <a href="/studio/press-designer.html" class="studio-dashboard-action">press / links</a>
      <a href="/studio/shop-designer.html" class="studio-dashboard-action">shop / product</a>
      <button type="button" class="studio-dashboard-action" id="workspaceExportBtn">export</button>
    </section>

    <section class="studio-dashboard-section">
      <h2 class="studio-journal-section-title">ai</h2>
      <p class="studio-dashboard-hint">digest and analyze the live metrics snapshot — trends, comparisons, what to focus on next. never invents numbers.</p>
      <form id="studioAiForm" class="studio-dashboard-ai">
        <textarea id="studioAiInput" class="studio-journal-textarea studio-journal-textarea--compact" rows="2" placeholder="which tracks are gaining streams? compare this week to last…" spellcheck="false"></textarea>
        <button type="submit" class="studio-dashboard-action">ask</button>
      </form>
      <p id="studioAiReply" class="studio-dashboard-note"></p>
    </section>
  </main>

  <script src="js/studio-auth.js?v=20260710l"></script>
  <script src="../shared/studio-playback-stack.js?v=20260710l"></script>
  <script src="js/studio-spa-router.js?v=20260710l"></script>
  <script src="js/dashboard-page.js?v=20260710aa"></script>
  <script src="js/studio-ai-panel.js?v=20260710l"></script>
</body>
</html>
