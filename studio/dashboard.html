<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="../shared/studio-pwa-viewport.js?v=20260709l"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#000000">
  <title>dashboard — burnfolder studio</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="../style.css?v=20260710l">
  <link rel="stylesheet" href="css/studio.css?v=20260714b">
</head>
<body class="studio-page studio-dashboard-page">
  <header class="site-header studio-header">
    <a href="/studio/dashboard.html" class="site-brand">burnfolder studio</a>
    <nav class="site-nav studio-header-nav studio-main-nav" aria-label="Studio">
      <a href="/studio/dashboard.html" class="studio-main-nav-link page-nav" data-nav="dashboard">dashboard</a>
      <a href="/studio/index.html" class="studio-main-nav-link" data-nav="entry">entry</a>
      <a href="/studio/stream.html" class="studio-main-nav-link" data-nav="stream">music</a>
      <a href="/studio/video.html" class="studio-main-nav-link" data-nav="video">video</a>
      <a href="/studio/journal.html" class="studio-main-nav-link" data-nav="journal">journal</a>
    </nav>
  </header>

  <div class="studio-analytics-nav" id="dashboardAnalyticsNav" hidden>
    <label class="studio-analytics-period-wrap">
      <select id="dashboardAnalyticsPeriod" class="studio-analytics-period-select" aria-label="Time range">
        <option value="hour">hour</option>
        <option value="day">day</option>
        <option value="week" selected>week</option>
        <option value="month">month</option>
        <option value="year">year</option>
        <option value="all">all</option>
      </select>
    </label>
  </div>

  <main class="page-wrap studio-dashboard-layout">
    <p class="studio-dashboard-empty" id="dashboardAnalyticsEmpty">loading…</p>

    <section class="studio-dashboard-section studio-dashboard-pulse-section" id="dashboardPulseSection" hidden>
      <div class="studio-analytics-overview" id="dashboardPulse" aria-live="polite"></div>
    </section>

    <section class="studio-dashboard-section studio-market-desk-section" id="marketDeskSection">
      <article class="studio-market-desk" id="marketDesk">
        <p class="studio-market-desk-line" id="siteDigestHeadline">…</p>
        <button type="button" class="studio-market-desk-go" id="siteDigestQueueMove" hidden>do this</button>
        <button type="button" class="studio-market-desk-refresh" id="marketDeskRefresh" title="read again" aria-label="read again">again</button>
      </article>
      <div id="marketDeskActs" class="studio-market-desk-write" hidden>
        <div id="marketDeskQueue" class="studio-market-queue"></div>
      </div>
    </section>

    <section class="studio-dashboard-section studio-dashboard-closer-section" id="dashboardCloserSection" hidden>
      <details class="studio-dashboard-closer" id="dashboardCloser">
        <summary class="studio-dashboard-closer-summary">look closer</summary>
        <div class="studio-dashboard-closer-body" id="dashboardCloserFeed"></div>
      </details>
    </section>
  </main>

  <script src="../shared/site-version.js?v=20260714b"></script>
  <script src="js/studio-version.js?v=20260714b"></script>
  <script src="js/studio-auth.js?v=20260714b"></script>
  <script src="../shared/studio-playback-stack.js?v=20260710l"></script>
  <script src="js/studio-spa-router.js?v=20260714b"></script>
  <script src="js/dashboard-page.js?v=20260714b"></script>
  <script src="js/studio-ai-panel.js?v=20260714b"></script>
  <script src="../shared/register-sw.js"></script>
  <script>
    /* Network-first HTML watchdog: if remodeled dash stays on loading…,
       clear PWA caches once and hard-reload so stale dashboard JS cannot stick. */
    (function () {
      var KEY = 'bf-dash-cache-bust';
      function stuck() {
        var empty = document.getElementById('dashboardAnalyticsEmpty');
        var pulse = document.getElementById('dashboardPulseSection');
        if (!empty || !pulse) return false;
        if (empty.hidden) return false;
        var text = String(empty.textContent || '').replace(/\s+/g, ' ').trim();
        return text.indexOf('loading') === 0 && pulse.hidden;
      }
      function bust() {
        try {
          if (sessionStorage.getItem(KEY) === '1') return;
          sessionStorage.setItem(KEY, '1');
        } catch (e) {}
        var finish = function () {
          location.replace(location.pathname + '?_bust=' + Date.now());
        };
        var tasks = [];
        if (window.caches && caches.keys) {
          tasks.push(
            caches.keys().then(function (keys) {
              return Promise.all(
                keys
                  .filter(function (k) {
                    return /burnfolder/i.test(k);
                  })
                  .map(function (k) {
                    return caches.delete(k);
                  })
              );
            })
          );
        }
        if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(
                regs.map(function (r) {
                  return r.unregister();
                })
              );
            })
          );
        }
        Promise.all(tasks).then(finish, finish);
      }
      setTimeout(function () {
        if (stuck()) bust();
        else {
          try {
            sessionStorage.removeItem(KEY);
          } catch (e) {}
        }
      }, 8000);
    })();
  </script>
</body>
</html>
