<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>album — burnfolder.com</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://stream.mux.com" crossorigin>
  <link rel="preconnect" href="https://image.mux.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="style.css?v=20260709m">
  <script src="shared/site-menu.js?v=20260720w" defer></script>
</head>
<body>
  <div id="siteMenu"></div>
<a href="cart.html" class="icon-btn site-cart-btn site-cart-btn--hidden" id="cartFloat" title="View cart">cart</a>

<div class="page-wrap" id="albumHubPage">
    <div class="song-hub-header">
      <div class="song-hub-header-text">
        <h2 class="song-hub-title" data-album-field="title">Album</h2>
        <p class="song-hub-subtitle" data-album-field="subtitle">—</p>
        <p class="song-hub-meta" data-album-field="track-meta" hidden></p>
      </div>
    </div>

    <div class="song-hub-cover-row">
      <div data-album-panel="cover" class="song-hub-cover-wrap" hidden>
        <img data-album-field="cover" class="song-hub-cover-image" alt="">
      </div>
      <button type="button" class="bottom-play-pause-btn song-hub-play" id="albumHubPlay" hidden aria-label="Play album"></button>
    </div>

    <div data-album-panel="video" class="song-hub-panel" hidden>
      <div data-album-field="video-hero" class="song-hub-video-hero"></div>
    </div>

    <div data-album-panel="links" class="song-hub-panel" hidden>
      <nav class="album-hub-links" data-album-field="links" aria-label="Album links"></nav>
    </div>

    <div class="song-hub-panel">
      <div data-album-field="tracklist"></div>
    </div>

    <div data-album-panel="thoughts" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Thoughts</p>
      </div>
      <div class="song-hub-notes" data-album-field="thoughts"></div>
    </div>

    <div data-album-panel="compiled-notes" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Notes</p>
      </div>
      <div data-album-field="compiled-notes"></div>
    </div>

    <div data-album-panel="visuals" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Visuals</p>
      </div>
      <div class="song-hub-content-grid" data-album-field="visuals-grid"></div>
    </div>
  </div>

  <div id="audioList" style="display: none;"></div>
  <div class="page-watermark">album</div>

  <div class="bottom-progress-bar" id="bottomBar">
    <div class="close-btn" id="closeBtn" aria-label="Close Now Playing">✕</div>
    <div class="bottom-bar-content">
      <mux-player id="activeMuxPlayer" audio playsinline stream-type="on-demand" preload="metadata" style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"></mux-player>
      <span class="song-title" id="songTitle">Track Title</span>
      <div class="bottom-bar-controls">
        <button class="bottom-play-pause-btn" id="bottomPlayPause" aria-label="Play/Pause">▶</button>
      </div>
      <div class="progress-bar-area" id="progressBarArea">
        <div class="progress" id="progress"></div>
        <div class="progress-playhead" id="progressPlayhead"></div>
      </div>
      <div class="loading-spinner" id="loadingSpinner"></div>
    </div>
  </div>

  <script src="album-pages.js?v=20260709m"></script>
  <script src="song-pages.js?v=20260709m"></script>
  <script src="shared/song-versions.js?v=20260709m"></script>
  <script src="shared/song-page-render.js?v=20260709m"></script>
  <script src="shared/album-page-render.js?v=20260709m"></script>
  <script src="shared/playback-prefetch.js?v=20260709m"></script>
  <script src="shared/studio-tap.js?v=20260709m"></script>
  <script src="shared/album-hub-boot.js?v=20260709m"></script>
  <script src="entries.js?v=20260709m" defer></script>
  <script src="songs.js?v=20260709m" defer></script>
  <script src="shared/mux-playback.js?v=20260723lock1" defer></script>
  <script src="shared/media-session.js?v=20260709m" defer></script>
  <script src="shared/playback-recall.js?v=20260709m" defer></script>
  <script src="shared/playback-context.js?v=20260709m" defer></script>
  <script src="shared/version-picker.js?v=20260709m" defer></script>
  <script src="shared/now-playing-bar.js?v=20260720play1" defer></script>
  <script src="spa-router.js?v=20260723play1" defer></script>
  <script src="scripts.js?v=20260720play2" defer></script>
  <script src="shared/site-version.js?v=20260709m" defer></script>
  <script src="shared/register-sw.js?v=20260709m" defer></script>
  <script src="shared/analytics-config.js"></script>
  <script src="shared/analytics-beacon.js"></script>
</body>
</html>
