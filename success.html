<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success - burnfolder.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-brand">burnfolder.com</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="music.html" class="page-nav">music</a>
      <a href="content.html" class="page-nav">video</a>
      <a href="shop.html" class="page-nav">shop</a>
    </nav>
    <a href="cart.html" class="icon-btn site-cart-btn site-cart-btn--hidden" id="cartFloat" title="View cart">cart</a>
  </header>

  <div class="page-wrap">
    <p class="page-id">success</p>
    <h1 id="successTitle">Order Confirmed</h1>
    <p class="page-annotation" id="successMessage">payment successful. your order is being prepared and a shipping label is being created automatically. you will receive tracking information at the email you provided.</p>
    <p class="page-annotation" style="margin-top:24px;" id="successThanks">thank you.</p>
    <a href="index.html" class="icon-btn" style="margin-top:32px;text-decoration:none;" id="successLink">Back to Home</a>
  </div>
  <div class="page-watermark">success</div>
  <script src="shop-products.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const isTip = params.get('type') === 'tip';
    const isDigital = params.get('type') === 'digital';
    const productId = params.get('product') || '';

    function readRememberedPurchase() {
      try {
        const raw = sessionStorage.getItem('burnfolderDigitalPurchase');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function resolveDigitalProduct() {
      const remembered = readRememberedPurchase();
      const catalog = window.burnfolderShopProducts;
      const products = catalog && Array.isArray(catalog.products) ? catalog.products : [];
      let fromCatalog = null;
      if (productId) {
        fromCatalog = products.find(function (p) { return p && p.id === productId; }) || null;
      }
      if (!fromCatalog && remembered && remembered.id) {
        fromCatalog = products.find(function (p) { return p && p.id === remembered.id; }) || null;
      }
      return {
        title: (fromCatalog && fromCatalog.title) || (remembered && remembered.title) || 'digital album',
        downloadHref: (fromCatalog && fromCatalog.downloadHref) || (remembered && remembered.downloadHref) || ''
      };
    }

    if (isTip) {
      document.getElementById('successTitle').textContent = 'Tip Confirmed';
      document.getElementById('successMessage').textContent = 'payment successful. thank you for supporting burnfolder.';
      document.getElementById('successThanks').textContent = 'your support keeps this work moving.';
      document.getElementById('successLink').setAttribute('href', 'music.html');
      document.getElementById('successLink').textContent = 'Back to Music';
    } else if (isDigital) {
      const product = resolveDigitalProduct();
      document.getElementById('successTitle').textContent = 'Purchase confirmed';
      document.getElementById('successMessage').textContent =
        'payment successful for ' + product.title + '.';
      document.getElementById('successThanks').textContent = product.downloadHref
        ? 'your download is ready.'
        : 'download link will appear here once the file is published.';
      const link = document.getElementById('successLink');
      if (product.downloadHref) {
        link.setAttribute('href', product.downloadHref);
        link.setAttribute('download', '');
        link.textContent = 'Download';
      } else {
        link.setAttribute('href', 'album.html?album=photonegative');
        link.textContent = 'Back to album';
      }
    } else {
      localStorage.removeItem('cart');
    }
  </script>
<script src="shared/analytics-config.js"></script>
<script src="shared/analytics-beacon.js"></script>
</body>
</html>
