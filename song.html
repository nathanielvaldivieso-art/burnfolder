<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>song — burnfolder.com</title>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="style.css?v=20260624e">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-brand">burnfolder.com</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="music.html" class="page-nav">music</a>
      <a href="content.html" class="page-nav">video</a>
      <a href="shop.html" class="page-nav">shop</a>
    </nav>
    <a href="cart.html" class="icon-btn site-cart-btn site-cart-btn--hidden" id="cartFloat" title="View cart">cart</a>
  </header>

  <div class="page-wrap" id="songHubPage">
    <p class="page-id">song hub</p>

    <div class="song-hub-header">
      <div class="song-hub-header-text">
        <h2 class="song-hub-title" id="songHubTitle">Song</h2>
        <p class="song-hub-subtitle" id="songHubSubtitle">Collecting versions...</p>
      </div>
    </div>

    <div data-song-panel="cover" class="song-hub-cover-wrap" hidden>
      <img data-song-field="cover" class="song-hub-cover-image" alt="">
    </div>

    <div data-song-panel="video" class="song-hub-panel" hidden>
      <div data-song-field="video-hero" class="song-hub-video-hero"></div>
    </div>

    <div class="song-hub-panel">
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Versions</p>
        <label class="song-hub-sort-label" for="songHubSort">Sort</label>
        <select id="songHubSort" class="song-hub-sort">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>
      <div class="song-hub-versions" id="songHubVersions"></div>
    </div>

    <div data-song-panel="lyrics" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Lyrics</p>
      </div>
      <div class="song-hub-lyrics song-hub-lyrics--open" data-song-field="version-lyrics"></div>
    </div>

    <div data-song-panel="version-notes" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Version notes</p>
      </div>
      <div class="song-hub-notes" data-song-field="version-notes"></div>
    </div>

    <div data-song-panel="clips" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Clips</p>
      </div>
      <div class="song-hub-content-grid" data-song-field="clips-grid"></div>
    </div>

    <div data-song-panel="notes" class="song-hub-panel" hidden>
      <div class="song-hub-panel-top">
        <p class="song-hub-label">Song notes</p>
      </div>
      <div class="song-hub-notes" data-song-field="notes"></div>
    </div>
  </div>

  <div id="audioList" style="display: none;"></div>
  <div class="page-watermark">song</div>

  <div class="bottom-progress-bar" id="bottomBar">
    <div class="close-btn" id="closeBtn" aria-label="Close Now Playing">✕</div>
    <div class="bottom-bar-content">
      <mux-player id="activeMuxPlayer" audio playsinline stream-type="on-demand" preload="metadata" style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"></mux-player>
      <span class="song-title" id="songTitle">Track Title</span>
      <div class="bottom-bar-controls">
        <button class="bottom-play-pause-btn" id="bottomPlayPause" aria-label="Play/Pause">▶</button>
      </div>
      <div class="progress-bar-area" id="progressBarArea">
        <div class="progress" id="progress"></div>
        <div class="progress-playhead" id="progressPlayhead"></div>
      </div>
      <div class="loading-spinner" id="loadingSpinner"></div>
    </div>
  </div>

  <script src="entries.js"></script>
  <script src="entry-renderer.js"></script>
  <script src="songs.js"></script>
  <script src="song-pages.js"></script>
  <script src="shared/song-versions.js"></script>
  <script src="shared/song-page-render.js?v=20260627h"></script>
  <script src="stripe-publishable.js"></script>
  <script src="spa-router.js"></script>
  <script src="shared/studio-tap.js?v=20260627h"></script>
  <script src="shared/playback-context.js?v=20260627h"></script>
  <script src="shared/version-picker.js?v=20260708c"></script>
  <script src="shared/now-playing-bar.js?v=20260703e"></script>
  <script src="scripts.js?v=20260708c"></script>
</body>
</html>
